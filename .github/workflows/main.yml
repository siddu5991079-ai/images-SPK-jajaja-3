name: 🎨 Thumbnail Generator Bot

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Website URL'
        required: true
        default: 'https://dlstreams.com/watch.php?id=598'
      image_prefix:
        description: 'Image Name Start (e.g., Match1, Live_Thumbnail)'
        required: true
        default: 'Live_Thumbnail'

permissions:
  contents: write 

jobs:
  run-thumbnail-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔥 FIX: FFMPEG YAHAN ADD KIYA HAI TAHO X11GRAB CHAL SAKE
    - name: Install System Tools (Chrome, Xvfb & FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb ffmpeg

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Node Libraries
      run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

    - name: Authenticate GitHub CLI
      run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

    - name: 🚀 Run Infinite Thumbnail Loop
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TARGET_URL: ${{ inputs.target_url }}
        IMAGE_PREFIX: ${{ inputs.image_prefix }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24 -ac" node thumbnail_bot.js
